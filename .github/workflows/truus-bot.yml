name: Truus luistert

on:
  # Zelf-herstartend: elke sessie start aan het eind de volgende. Deze cron is een
  # vangnet dat Truus weer opstart mocht een sessie onverwacht crashen.
  schedule:
    - cron: "7 */6 * * *"
  workflow_dispatch: {}

# Nooit twee live-sessies tegelijk (Telegram staat maar één luisteraar toe).
concurrency:
  group: truus-bot
  cancel-in-progress: false

permissions:
  actions: write      # nodig om de opvolg-sessie te kunnen starten
  contents: read

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # iets onder de sessie-budget van bot.py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Truus luistert live
        env:
          GH_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL1_USER: ${{ secrets.GMAIL1_USER }}
          GMAIL1_PASS: ${{ secrets.GMAIL1_PASS }}
          GMAIL2_USER: ${{ secrets.GMAIL2_USER }}
          GMAIL2_PASS: ${{ secrets.GMAIL2_PASS }}
          HOSTNET_USER: ${{ secrets.HOSTNET_USER }}
          HOSTNET_PASS: ${{ secrets.HOSTNET_PASS }}
          HOSTNET_IMAP_HOST: ${{ secrets.HOSTNET_IMAP_HOST }}
          HOSTNET_SMTP_HOST: ${{ secrets.HOSTNET_SMTP_HOST }}
        run: python bot.py
